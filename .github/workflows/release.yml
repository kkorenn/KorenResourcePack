name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.0.1)"
        required: true
        type: string
      release_name:
        description: "Release name (e.g. Performance Update)"
        required: true
        type: string
      changelog:
        description: "Short changelog (supports markdown)"
        required: false
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify zip exists
        run: |
          if [ ! -f KorenResourcePack.zip ]; then
            echo "::error::KorenResourcePack.zip not found in repo root"
            exit 1
          fi
          ls -la KorenResourcePack.zip

      - name: Sync Info.json version
        run: |
          VERSION="${{ inputs.version }}"
          python3 - <<EOF
          import json, pathlib
          p = pathlib.Path("Info.json")
          data = json.loads(p.read_text())
          data["Version"] = "$VERSION"
          p.write_text(json.dumps(data, indent=2) + "\n")
          print(p.read_text())
          EOF

      - name: Rebuild zip with synced Info.json
        run: |
          STAGE_PARENT=$(mktemp -d)
          STAGE="$STAGE_PARENT/KorenResourcePack"
          mkdir -p "$STAGE"

          unzip -o KorenResourcePack.zip -d /tmp/orig_extract >/dev/null

          # Copy everything from original zip
          cp -R /tmp/orig_extract/KorenResourcePack/. "$STAGE/"

          # Ensure Fonts are up-to-date
          if [ -d Fonts ]; then
            mkdir -p "$STAGE/Fonts"
            find Fonts -type f \( -iname '*.ttf' -o -iname '*.ttc' \) -exec cp {} "$STAGE/Fonts/" \;
          fi

          # Overwrite Info.json
          cp Info.json "$STAGE/"

          rm KorenResourcePack.zip

          (cd "$STAGE_PARENT" && zip -r "$GITHUB_WORKSPACE/KorenResourcePack.zip" KorenResourcePack >/dev/null)

          unzip -l KorenResourcePack.zip

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }} ${{ inputs.release_name }}
          prerelease: ${{ inputs.prerelease }}
          body: |
            ${{ inputs.changelog }}
          files: KorenResourcePack.zip

      - name: Send Discord notification
        if: success()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "Webhook not set, skipping Discord notification"
            exit 0
          fi

          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/v${{ inputs.version }}"

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"embeds\": [{
              \"title\": \"<:Easy:1040840315143196702> New Update!\",
              \"description\": \"**v${{ inputs.version }} ${{ inputs.release_name }}**\",
              \"color\": 5814783,
              \"fields\": [
                {
                  \"name\": \"📜 Changelog\",
                  \"value\": \"${{ inputs.changelog || 'No changelog provided.' }}\"
                }
              ],
              \"footer\": {
                \"text\": \"Koren Resource Pack\"
              },
              \"url\": \"${RELEASE_URL}\"
            }]
          }" \
          "$WEBHOOK"