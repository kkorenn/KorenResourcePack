name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 1.0.1)"
        required: true
        type: string
      release_name:
        description: "Release name (e.g. Performance Update)"
        required: true
        type: string
      changelog:
        description: "Short changelog (use \n for new lines)"
        required: false
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify zip exists
        run: |
          if [ ! -f KorenResourcePack.zip ]; then
            echo "::error::KorenResourcePack.zip not found in repo root"
            exit 1
          fi
          ls -la KorenResourcePack.zip

      - name: Sync Info.json version
        run: |
          VERSION="${{ inputs.version }}"
          python3 - <<EOF
          import json, pathlib
          p = pathlib.Path("Info.json")
          data = json.loads(p.read_text())
          data["Version"] = "$VERSION"
          p.write_text(json.dumps(data, indent=2) + "\n")
          print(p.read_text())
          EOF

      - name: Rebuild zip with synced Info.json
        run: |
          STAGE_PARENT=$(mktemp -d)
          STAGE="$STAGE_PARENT/KorenResourcePack"
          mkdir -p "$STAGE"

          unzip -o KorenResourcePack.zip -d /tmp/orig_extract >/dev/null

          cp -R /tmp/orig_extract/KorenResourcePack/. "$STAGE/"

          if [ -d Fonts ]; then
            mkdir -p "$STAGE/Fonts"
            find Fonts -type f \( -iname '*.ttf' -o -iname '*.ttc' \) -exec cp {} "$STAGE/Fonts/" \;
          fi

          cp Info.json "$STAGE/"
          rm KorenResourcePack.zip

          (cd "$STAGE_PARENT" && zip -r "$GITHUB_WORKSPACE/KorenResourcePack.zip" KorenResourcePack >/dev/null)

          unzip -l KorenResourcePack.zip

      - name: Convert changelog newlines
        id: changelog
        run: |
          echo "body<<EOF" >> $GITHUB_OUTPUT
          printf "%b\n" "${{ inputs.changelog }}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }} ${{ inputs.release_name }}
          prerelease: ${{ inputs.prerelease }}
          body: ${{ steps.changelog.outputs.body }}
          files: KorenResourcePack.zip

      # 🔥 Python setup
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Discord bot dependencies
        run: python -m pip install -r bot/requirements.txt

      - name: Run Discord sender
        run: python bot/send.py
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CHANNEL_ID: "1500075102002483201"
          VERSION: ${{ inputs.version }}
          RELEASE_NAME: ${{ inputs.release_name }}
          CHANGELOG: ${{ inputs.changelog }}
          GITHUB_REPOSITORY: ${{ github.repository }}
